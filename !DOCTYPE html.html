<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALL The BEST</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f8ff;
            color: #333;
            text-align: center;
            padding: 50px;
            margin: 0;
        }
        .message {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 30px;
            line-height: 1.5;
        }
        .button {
            background-color: #4CAF50;
            color: white;
            padding: 15px 32px;
            text-align: center;
            text-decoration: none;
            display: inline-block;
            font-size: 16px;
            margin: 4px 2px;
            cursor: pointer;
            border: none;
            border-radius: 4px;
        }
        .button:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>
    <h1>ALL The BEST</h1>
    <div class="message">
        Hey user this message is sent by a friend to you wishing you all the best for your upcoming result so you should also return him/her something as a same wish for him/her's best wishes that should BEST OF LUCK YOU TOO!!!
    </div>
    <a href="#" class="button">Return the Wish</a>
</body>
</html>
